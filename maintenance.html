<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系統維護中 - 部落格</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ededed;
        font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
        color: #1d1d1d;
      }
      .card {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 8px;
        max-width: 480px;
        width: calc(100% - 32px);
        padding: 48px 40px;
        text-align: center;
      }
      h1 {
        font-size: 26px;
        color: #037971;
        margin-bottom: 16px;
      }
      p {
        color: #666;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>系統維護中</h1>
      <p>網站正在進行例行維護，造成不便敬請見諒。<br />請稍後再回來看看。</p>
    </div>
  </body>
</html>
